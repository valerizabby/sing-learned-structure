<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Generation · SingLS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- html-midi-player (Web Component) -->
  <script src="https://cdn.jsdelivr.net/combine/npm/tone@14,npm/@magenta/music@1.23.1/es6/core.js,npm/html-midi-player@1.5.0"></script>

  <style>
    midi-player {
      display: block;
      width: 100%;
      --player-background: #1e293b;
      --player-color: #e2e8f0;
    }
    midi-visualizer {
      display: block;
      width: 100%;
      height: 120px;
      overflow: hidden;
    }
    midi-visualizer .piano-roll-visualizer {
      background: #0f172a;
    }
    .segment-badge {
      user-select: none;
    }
    .page { display: none; }
    .page.active { display: block; }
    @keyframes pulse-bar {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse-bar { animation: pulse-bar 1.2s ease-in-out infinite; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f9ff',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

<!-- ══════════════════════════════════════════════════════
     PAGE 1 — FORM
══════════════════════════════════════════════════════ -->
<div id="page-form" class="page active">
  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-10 text-center">
      <h1 class="text-4xl font-bold tracking-tight text-white">🎵 Music Generation</h1>
      <p class="mt-2 text-slate-400 text-sm">Генерация музыки с заданной структурой · SingLS</p>
    </div>

    <!-- Form card -->
    <div class="bg-slate-800 rounded-2xl shadow-xl p-8 space-y-8">

      <!-- 1. Prompt -->
      <div>
        <label class="block text-sm font-semibold text-slate-300 mb-2">
          Текстовый промт
        </label>
        <textarea
          id="prompt"
          rows="2"
          placeholder="gentle piano melody in C major, slow and melancholic"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-sm
                 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2
                 focus:ring-brand-500 resize-none"
        ></textarea>
      </div>

      <!-- 2. Segment plan -->
      <div>
        <label class="block text-sm font-semibold text-slate-300 mb-3">
          Структура трека
        </label>

        <!-- Segment list -->
        <div id="segment-list" class="space-y-2 mb-4"></div>

        <!-- Add buttons -->
        <div class="flex flex-wrap gap-2">
          <span class="text-xs text-slate-500 self-center mr-1">Добавить:</span>
          <button onclick="addSegment('intro')"   class="seg-btn bg-violet-700 hover:bg-violet-600">intro</button>
          <button onclick="addSegment('verse')"   class="seg-btn bg-blue-700   hover:bg-blue-600">verse</button>
          <button onclick="addSegment('chorus')"  class="seg-btn bg-emerald-700 hover:bg-emerald-600">chorus</button>
          <button onclick="addSegment('bridge')"  class="seg-btn bg-amber-700  hover:bg-amber-600">bridge</button>
          <button onclick="addSegment('instr')"   class="seg-btn bg-cyan-700   hover:bg-cyan-600">instr</button>
          <button onclick="addSegment('outro')"   class="seg-btn bg-rose-700   hover:bg-rose-600">outro</button>
          <button onclick="addSegment('other')"   class="seg-btn bg-slate-600  hover:bg-slate-500">other</button>
        </div>

        <style>
          .seg-btn {
            @apply text-xs font-semibold text-white px-3 py-1.5 rounded-lg transition-colors;
          }
        </style>
      </div>

      <!-- 3. SSM Preview -->
      <div>
        <label class="block text-sm font-semibold text-slate-300 mb-2">
          SSM Preview
        </label>
        <div id="ssm-preview-wrap" class="flex items-center justify-center
             bg-slate-700 rounded-xl border border-slate-600 h-48 overflow-hidden">
          <span id="ssm-placeholder" class="text-slate-500 text-sm">
            Добавьте сегменты для предпросмотра
          </span>
          <img id="ssm-preview-img" src="" alt="SSM" class="hidden h-full object-contain" />
        </div>
      </div>

      <!-- 4. Advanced params (collapsed) -->
      <details class="group">
        <summary class="cursor-pointer text-sm font-semibold text-slate-400
                        hover:text-slate-200 transition-colors list-none flex items-center gap-2">
          <svg class="w-4 h-4 transition-transform group-open:rotate-90" fill="none"
               stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
          Дополнительные параметры
        </summary>
        <div class="mt-4 grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs text-slate-400 mb-1">Темп (BPM)</label>
            <input id="tempo" type="number" value="120" min="40" max="240"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2
                          text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500" />
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Длина prefix (баров)</label>
            <input id="n_prefix_bars" type="number" value="8" min="2" max="32"
                   class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2
                          text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500" />
          </div>
          <div class="col-span-2">
            <label class="block text-xs text-slate-400 mb-1">Тип SSM</label>
            <select id="ssm_type"
                    class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2
                           text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500">
              <option value="affinity" selected>affinity — теоретическая A_fixed (рекомендуется)</option>
              <option value="empirical">empirical — из датасета SALAMI</option>
              <option value="random">random — нижняя граница ablation</option>
              <option value="none">none — без SSM (baseline)</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-xs text-slate-400 mb-1">Путь к модели (.pt)</label>
            <select id="model_path"
                    class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2
                           text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500">
              <option value="">Загрузка списка...</option>
            </select>
          </div>
        </div>
      </details>

      <!-- Error -->
      <div id="form-error" class="hidden bg-red-900/50 border border-red-700
           text-red-300 text-sm rounded-lg px-4 py-3"></div>

      <!-- Submit -->
      <button id="btn-generate" onclick="startGeneration()"
              class="w-full bg-brand-600 hover:bg-brand-500 active:bg-brand-700
                     text-white font-bold py-4 rounded-xl text-base transition-colors
                     disabled:opacity-50 disabled:cursor-not-allowed">
        Сгенерировать трек ✨
      </button>

    </div><!-- /card -->
  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     PAGE 2 — PROGRESS
══════════════════════════════════════════════════════ -->
<div id="page-progress" class="page">
  <div class="max-w-xl mx-auto px-4 py-16">
    <div class="bg-slate-800 rounded-2xl shadow-xl p-8 text-center space-y-8">

      <div>
        <h2 class="text-2xl font-bold text-white mb-1">Генерация...</h2>
        <p id="progress-message" class="text-slate-400 text-sm">Инициализация</p>
      </div>

      <!-- Steps -->
      <div class="space-y-3" id="steps-list">
        <!-- Populated by JS -->
      </div>

      <!-- Bar -->
      <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
        <div id="progress-bar"
             class="h-3 bg-gradient-to-r from-brand-500 to-emerald-400 rounded-full
                    transition-all duration-500 animate-pulse-bar"
             style="width: 0%"></div>
      </div>

      <!-- Error box -->
      <div id="progress-error" class="hidden bg-red-900/50 border border-red-700
           text-red-300 text-sm rounded-lg px-4 py-3 text-left"></div>

    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     PAGE 3 — RESULT
══════════════════════════════════════════════════════ -->
<div id="page-result" class="page">
  <div class="max-w-3xl mx-auto px-4 py-10 space-y-6">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h2 class="text-3xl font-bold text-white">Трек сгенерирован 🎉</h2>
        <p class="text-slate-400 text-sm mt-1" id="result-meta"></p>
      </div>
      <button onclick="goHome()"
              class="flex items-center gap-2 text-sm text-slate-400 hover:text-white
                     bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Новая генерация
      </button>
    </div>

    <!-- MIDI Player card -->
    <div class="bg-slate-800 rounded-2xl shadow-xl p-6 space-y-4">
      <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">
        MIDI Player
      </h3>

      <midi-visualizer type="piano-roll" id="midi-visualizer"></midi-visualizer>
      <midi-player id="midi-player" sound-font visualizer="#midi-visualizer"></midi-player>

      <button id="btn-download" onclick="downloadMidi()"
              class="w-full flex items-center justify-center gap-2
                     bg-emerald-700 hover:bg-emerald-600 text-white font-semibold
                     py-3 rounded-xl transition-colors text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Скачать MIDI
      </button>
    </div>

    <!-- SSM Overview -->
    <div class="bg-slate-800 rounded-2xl shadow-xl p-6 space-y-3">
      <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wide">
        Pipeline Overview (SSM + Piano Roll)
      </h3>
      <img id="result-overview" src="" alt="Pipeline overview"
           class="w-full rounded-lg border border-slate-700" />
    </div>

  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     JS
══════════════════════════════════════════════════════ -->
<script>
// ── State ──────────────────────────────────────────────
const SEGMENT_COLORS = {
  intro:  { bg: 'bg-violet-700', text: 'text-violet-200', border: 'border-violet-500' },
  verse:  { bg: 'bg-blue-700',   text: 'text-blue-200',   border: 'border-blue-500'   },
  chorus: { bg: 'bg-emerald-700',text: 'text-emerald-200',border: 'border-emerald-500'},
  bridge: { bg: 'bg-amber-700',  text: 'text-amber-200',  border: 'border-amber-500'  },
  instr:  { bg: 'bg-cyan-700',   text: 'text-cyan-200',   border: 'border-cyan-500'   },
  outro:  { bg: 'bg-rose-700',   text: 'text-rose-200',   border: 'border-rose-500'   },
  other:  { bg: 'bg-slate-600',  text: 'text-slate-200',  border: 'border-slate-500'  },
};
const STEPS_LABELS = [
  'Text → Prefix (MusicGen)',
  'Сегменты → SSM',
  'Загрузка модели',
  'Авторегрессивная генерация',
  'Экспорт MIDI',
];

let segments = [];   // [{label, bars}, ...]
let currentJobId = null;
let ssmPreviewTimer = null;

// ── Page navigation ────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  currentJobId = null;
  showPage('page-form');
  document.getElementById('form-error').classList.add('hidden');
}

// ── Segment management ─────────────────────────────────
function addSegment(label) {
  const defaultBars = { intro: 4, verse: 16, chorus: 16, bridge: 8, instr: 8, outro: 4, other: 8 };
  segments.push({ label, bars: defaultBars[label] || 8 });
  renderSegments();
  scheduleSsmPreview();
}

function removeSegment(idx) {
  segments.splice(idx, 1);
  renderSegments();
  scheduleSsmPreview();
}

function updateBars(idx, val) {
  const n = parseInt(val);
  if (n > 0) {
    segments[idx].bars = n;
    scheduleSsmPreview();
  }
}

function renderSegments() {
  const container = document.getElementById('segment-list');
  if (segments.length === 0) {
    container.innerHTML = '<p class="text-slate-500 text-sm italic">Нет сегментов. Добавьте снизу.</p>';
    return;
  }
  container.innerHTML = segments.map((s, i) => {
    const c = SEGMENT_COLORS[s.label] || SEGMENT_COLORS.other;
    return `
      <div class="flex items-center gap-3 ${c.bg} bg-opacity-30 border ${c.border}
                  rounded-lg px-4 py-2 segment-badge">
        <span class="text-xs font-bold uppercase tracking-wide ${c.text} w-14 shrink-0">${s.label}</span>
        <div class="flex items-center gap-1 text-sm text-slate-300">
          <input type="number" value="${s.bars}" min="1" max="64"
                 onchange="updateBars(${i}, this.value)"
                 class="w-16 bg-slate-800 border border-slate-600 rounded px-2 py-1
                        text-center text-sm focus:outline-none focus:ring-1 focus:ring-brand-500" />
          <span class="text-slate-500 text-xs">баров</span>
        </div>
        <div class="ml-auto flex gap-1">
          ${i > 0 ? `<button onclick="moveSegment(${i}, -1)" class="text-slate-400 hover:text-white p-1 rounded" title="Вверх">↑</button>` : ''}
          ${i < segments.length - 1 ? `<button onclick="moveSegment(${i}, 1)" class="text-slate-400 hover:text-white p-1 rounded" title="Вниз">↓</button>` : ''}
          <button onclick="removeSegment(${i})"
                  class="text-slate-500 hover:text-red-400 p-1 rounded ml-1" title="Удалить">✕</button>
        </div>
      </div>`;
  }).join('');
}

function moveSegment(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= segments.length) return;
  [segments[idx], segments[newIdx]] = [segments[newIdx], segments[idx]];
  renderSegments();
  scheduleSsmPreview();
}

// ── SSM Preview ────────────────────────────────────────
function scheduleSsmPreview() {
  clearTimeout(ssmPreviewTimer);
  ssmPreviewTimer = setTimeout(loadSsmPreview, 400);
}

async function loadSsmPreview() {
  if (segments.length === 0) {
    document.getElementById('ssm-placeholder').classList.remove('hidden');
    document.getElementById('ssm-preview-img').classList.add('hidden');
    return;
  }
  try {
    const resp = await fetch('/api/ssm-preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ segments, ssm_size: 256 }),
    });
    if (!resp.ok) return;
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const img = document.getElementById('ssm-preview-img');
    img.src = url;
    img.classList.remove('hidden');
    document.getElementById('ssm-placeholder').classList.add('hidden');
  } catch (e) {
    console.warn('SSM preview error:', e);
  }
}

// ── Model list ─────────────────────────────────────────
async function loadModels() {
  try {
    const resp = await fetch('/api/models');
    const data = await resp.json();
    const sel = document.getElementById('model_path');
    sel.innerHTML = data.models.length === 0
      ? '<option value="">Нет .pt файлов</option>'
      : data.models.map(m => `<option value="${m}">${m}</option>`).join('');
  } catch (e) {
    console.warn('Could not load models:', e);
  }
}

// ── Generate ───────────────────────────────────────────
async function startGeneration() {
  const errorBox = document.getElementById('form-error');
  errorBox.classList.add('hidden');

  const prompt = document.getElementById('prompt').value.trim();
  const modelPath = document.getElementById('model_path').value;

  if (!prompt) { showFormError('Введите текстовый промт'); return; }
  if (segments.length === 0) { showFormError('Добавьте хотя бы один сегмент'); return; }
  if (!modelPath) { showFormError('Выберите модель'); return; }

  const payload = {
    prompt,
    segments,
    tempo: parseFloat(document.getElementById('tempo').value),
    n_prefix_bars: parseInt(document.getElementById('n_prefix_bars').value),
    ssm_type: document.getElementById('ssm_type').value,
    model_path: modelPath,
  };

  document.getElementById('btn-generate').disabled = true;

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const err = await resp.json();
      showFormError(err.detail || 'Ошибка запуска генерации');
      document.getElementById('btn-generate').disabled = false;
      return;
    }
    const { job_id } = await resp.json();
    currentJobId = job_id;
    showProgressPage(job_id, payload);
  } catch (e) {
    showFormError('Ошибка соединения с сервером');
    document.getElementById('btn-generate').disabled = false;
  }
}

function showFormError(msg) {
  const box = document.getElementById('form-error');
  box.textContent = msg;
  box.classList.remove('hidden');
}

// ── Progress page ──────────────────────────────────────
function showProgressPage(jobId, payload) {
  // Render steps
  const stepsList = document.getElementById('steps-list');
  stepsList.innerHTML = STEPS_LABELS.map((lbl, i) => `
    <div id="step-row-${i+1}"
         class="flex items-center gap-3 text-sm text-slate-400 px-2 py-1.5 rounded-lg">
      <span id="step-icon-${i+1}" class="text-lg w-6 text-center">○</span>
      <span>${lbl}</span>
    </div>`).join('');

  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-message').textContent = 'Запуск...';
  document.getElementById('progress-error').classList.add('hidden');
  showPage('page-progress');

  // SSE
  const es = new EventSource(`/api/progress/${jobId}`);
  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    updateProgress(d);
    if (d.status === 'done') {
      es.close();
      setTimeout(() => showResultPage(jobId, payload), 600);
    } else if (d.status === 'error') {
      es.close();
      showProgressError(d.error || 'Неизвестная ошибка');
    }
  };
  es.onerror = () => {
    es.close();
    showProgressError('Потеряно соединение с сервером');
  };
}

function updateProgress(d) {
  const { step, total, message, status } = d;
  const pct = total > 0 ? Math.round((step / total) * 100) : 0;

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-message').textContent = message;

  for (let i = 1; i <= STEPS_LABELS.length; i++) {
    const iconEl = document.getElementById(`step-icon-${i}`);
    const rowEl  = document.getElementById(`step-row-${i}`);
    if (!iconEl) continue;
    if (i < step) {
      iconEl.textContent = '✓';
      rowEl.classList.remove('text-slate-400');
      rowEl.classList.add('text-emerald-400');
    } else if (i === step) {
      iconEl.textContent = '▶';
      rowEl.classList.remove('text-slate-400', 'text-emerald-400');
      rowEl.classList.add('text-brand-400');
    } else {
      iconEl.textContent = '○';
      rowEl.classList.remove('text-brand-400', 'text-emerald-400');
      rowEl.classList.add('text-slate-400');
    }
  }

  if (status === 'done') {
    document.getElementById('progress-bar').classList.remove('animate-pulse-bar');
    document.getElementById('progress-bar').style.width = '100%';
    // Mark all done
    for (let i = 1; i <= STEPS_LABELS.length; i++) {
      const iconEl = document.getElementById(`step-icon-${i}`);
      const rowEl  = document.getElementById(`step-row-${i}`);
      if (iconEl) iconEl.textContent = '✓';
      if (rowEl) { rowEl.classList.remove('text-slate-400','text-brand-400'); rowEl.classList.add('text-emerald-400'); }
    }
  }
}

function showProgressError(msg) {
  const box = document.getElementById('progress-error');
  box.textContent = '❌ ' + msg;
  box.classList.remove('hidden');
  document.getElementById('progress-bar').classList.remove('animate-pulse-bar');
  document.getElementById('progress-bar').classList.add('bg-red-500');

  // Back button
  box.innerHTML += `<br/><button onclick="goHome()" class="mt-3 text-white underline text-xs">← Вернуться</button>`;
}

// ── Result page ────────────────────────────────────────
function showResultPage(jobId, payload) {
  const midiUrl = `/api/midi/${jobId}`;
  const overviewUrl = `/api/ssm-result/${jobId}?t=${Date.now()}`;

  // MIDI player
  const player = document.getElementById('midi-player');
  const visualizer = document.getElementById('midi-visualizer');
  player.src = midiUrl;
  visualizer.src = midiUrl;

  // Overview image
  document.getElementById('result-overview').src = overviewUrl;

  // Meta
  const plan = payload.segments.map(s => `${s.label}:${s.bars}b`).join(' → ');
  document.getElementById('result-meta').textContent =
    `"${payload.prompt}" · ${plan} · ${payload.tempo} BPM`;

  // Re-enable generate button for next time
  document.getElementById('btn-generate').disabled = false;

  showPage('page-result');
}

function downloadMidi() {
  if (!currentJobId) return;
  const a = document.createElement('a');
  a.href = `/api/download/${currentJobId}`;
  a.download = 'generated.mid';
  a.click();
}

// ── Init ───────────────────────────────────────────────
renderSegments();
loadModels();

// Default segment plan: intro:4, verse:16, chorus:16, verse:16, chorus:16, outro:4
['intro','verse','chorus','verse','chorus','outro'].forEach(l => addSegment(l));
// Fix bars for default
const defaultBars = [4, 16, 16, 16, 16, 4];
defaultBars.forEach((b, i) => { segments[i].bars = b; });
renderSegments();
scheduleSsmPreview();
</script>

</body>
</html>
